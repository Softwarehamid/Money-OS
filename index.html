<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#10151f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="MoneyOS" />
    <title>MoneyOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar" aria-label="MoneyOS navigation">
        <div class="brand">
          <div class="brand-mark">M</div>
          <div>
            <p>MoneyOS</p>
            <span>Command Center</span>
          </div>
        </div>

        <nav class="nav-tabs" id="navTabs"></nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="todayLabel"></p>
            <h1 id="pageTitle">Dashboard</h1>
          </div>
          <div class="topbar-actions">
            <button
              class="secondary-button menu-toggle"
              id="menuToggleBtn"
              type="button"
              aria-expanded="false"
              aria-controls="sidebar"
              aria-label="Open navigation menu"
            >
              Menu
            </button>
            <button class="primary-button" id="quickAddBtn" type="button">
              Add Item
            </button>
          </div>
        </header>

        <section id="content" class="content" aria-live="polite"></section>
      </main>
    </div>

    <dialog id="entryDialog">
      <form method="dialog" class="dialog-card" id="entryForm">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">MoneyOS entry</p>
            <h2 id="dialogTitle">Add Item</h2>
          </div>
          <button
            class="icon-button"
            data-close-dialog
            aria-label="Close"
            type="button"
          >
            ×
          </button>
        </div>

        <label>
          Type
          <select id="entryType" name="entryType">
            <option value="paycheck">Paycheck</option>
            <option value="bill">Bill</option>
            <option value="debt">Debt</option>
            <option value="budget">Budget Category</option>
            <option value="saving">Savings Goal</option>
            <option value="expense">Expense</option>
          </select>
        </label>

        <div id="formFields" class="form-grid"></div>

        <div class="dialog-actions">
          <button
            class="danger-button hidden"
            id="deleteEntryBtn"
            type="button"
          >
            Delete
          </button>
          <button class="secondary-button" data-close-dialog type="button">
            Cancel
          </button>
          <button
            class="primary-button"
            id="saveEntryBtn"
            value="default"
            type="submit"
          >
            Save
          </button>
        </div>
      </form>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
